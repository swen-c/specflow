<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" font-family="'PingFang TC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#73726C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="8" y="8" width="924" height="404" rx="18" fill="#FFFFFF" stroke="#E6E4DD" stroke-width="1.5"/>

  <text x="36" y="48" font-size="21" font-weight="600" fill="#2C2C2A">specflow 協作流程（狀態機）</text>
  <text x="36" y="72" font-size="13" fill="#5F5E5A">一張 issue 在六個狀態間流轉；每段箭頭上的字 = 推動它前進的動作。</text>

  <text x="105" y="100" font-size="14" font-weight="600" fill="#5F5E5A" text-anchor="middle">new-feature</text>
  <text x="285" y="100" font-size="14" font-weight="600" fill="#5F5E5A" text-anchor="middle">ready</text>
  <text x="434" y="100" font-size="14" font-weight="600" fill="#5F5E5A" text-anchor="middle">claim</text>
  <text x="629" y="100" font-size="14" font-weight="600" fill="#5F5E5A" text-anchor="middle">finish</text>
  <text x="800" y="100" font-size="14" font-weight="600" fill="#5F5E5A" text-anchor="middle">merge</text>

  <line x1="92"  y1="142" x2="116" y2="142" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="260" y1="142" x2="308" y2="142" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="410" y1="142" x2="456" y2="142" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="604" y1="142" x2="652" y2="142" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="784" y1="142" x2="814" y2="142" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>

  <rect x="34" y="124" width="58" height="36" rx="18" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="63" y="147" font-size="14" fill="#2C2C2A" text-anchor="middle">需求</text>

  <rect x="120" y="112" width="140" height="60" rx="11" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="190" y="138" font-size="15" font-weight="600" fill="#633806" text-anchor="middle">needs-design</text>
  <text x="190" y="157" font-size="12" fill="#854F0B" text-anchor="middle">待對齊 / 跨端</text>

  <rect x="312" y="112" width="98" height="60" rx="11" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="361" y="138" font-size="15" font-weight="600" fill="#085041" text-anchor="middle">ready</text>
  <text x="361" y="157" font-size="12" fill="#0F6E56" text-anchor="middle">可認領</text>

  <rect x="460" y="112" width="144" height="60" rx="11" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="532" y="138" font-size="15" font-weight="600" fill="#0C447C" text-anchor="middle">in-progress</text>
  <text x="532" y="157" font-size="12" fill="#185FA5" text-anchor="middle">開發中</text>

  <rect x="656" y="112" width="128" height="60" rx="11" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="720" y="138" font-size="15" font-weight="600" fill="#3C3489" text-anchor="middle">in-review</text>
  <text x="720" y="157" font-size="12" fill="#534AB7" text-anchor="middle">PR 審查中</text>

  <rect x="818" y="124" width="70" height="36" rx="18" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="853" y="147" font-size="14" fill="#2C2C2A" text-anchor="middle">closed</text>

  <path d="M63,160 C 80,212 232,222 360,174" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="214" y="240" font-size="12" fill="#5F5E5A" text-anchor="middle">new-feature：明確小功能可直接開 ready</text>

  <path d="M500,112 C 500,84 564,84 564,112" fill="none" stroke="#73726C" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="532" y="78" font-size="12" fill="#5F5E5A" text-anchor="middle">report 回報進度（仍 in-progress）</text>

  <line x1="566" y1="172" x2="566" y2="244" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="580" y="200" font-size="12" fill="#5F5E5A" text-anchor="start">report --handoff</text>
  <text x="580" y="216" font-size="12" fill="#5F5E5A" text-anchor="start">移除 assignee</text>

  <line x1="498" y1="244" x2="498" y2="172" stroke="#73726C" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="484" y="200" font-size="12" fill="#5F5E5A" text-anchor="end">next 看到</text>
  <text x="484" y="216" font-size="12" fill="#5F5E5A" text-anchor="end">→ claim 接手</text>

  <rect x="460" y="246" width="144" height="58" rx="11" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="532" y="272" font-size="15" font-weight="600" fill="#0C447C" text-anchor="middle">待接手</text>
  <text x="532" y="291" font-size="12" fill="#185FA5" text-anchor="middle">in-progress · 無人</text>

  <text x="214" y="300" font-size="12" fill="#5F5E5A" text-anchor="middle">claim：指派 @me · 開 feat branch · 載入 specs</text>
  <text x="214" y="320" font-size="12" fill="#5F5E5A" text-anchor="middle">finish：整理 specs · typecheck/build · 開 PR（Closes #n）</text>
  <text x="214" y="340" font-size="12" fill="#888780" text-anchor="middle">specs/ = 系統現在做什麼的記憶 · label+assignee = 誰在做/什麼狀態</text>
</svg>
